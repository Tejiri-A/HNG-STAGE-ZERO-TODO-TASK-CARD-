<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Task Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script defer type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main>
      <h1 class="title">TODO TASK CARD UI</h1>
      <article class="todo" data-testid="test-todo-card" data-taskid="001">
        <header class="todo__header">
          <div class="todo__info">
            <span class="todo__priority" data-testid="test-todo-priority"
              >High</span
            >
            <span class="todo__status todo__status--pending">
              Pending
            </span>
          </div>
          <div class="todo__controls">
            <button
              type="button"
              class="btn"
              data-testid="test-todo-edit-button"
              aria-label="edit task"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-pencil-icon lucide-pencil"
              >
                <path
                  d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"
                />
                <path d="m15 5 4 4" />
              </svg>
            </button>
            <button
              type="button"
              class="btn"
              data-testid="test-todo--button"
              aria-label="delete task"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-trash-icon lucide-trash"
              >
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                <path d="M3 6h18" />
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              </svg>
            </button>
          </div>
        </header>
        <section class="todo__body">
          <div>
            <input
              type="checkbox"
              name="markAsComplete"
              id="markAsComplete"
              data-testid="test-todo-complete-toggle"
              class="todo__checkbox"
              aria-label="mark as done"
            />
          </div>
          <div>
            <h2 class="todo__title" data-testid="test-todo-title">
              Lorem ipsum dolor sit.
            </h2>
            <p class="todo__description" data-testid="test-todo-description">
              Lorem ipsum dolor, sit amet consectetur adipisicing elit.
              Excepturi possimus vitae corporis esse vero distinctio eaque.
              Laboriosam earum totam labore.
            </p>

            <ul
              role="list"
              class="todo__caterories"
              data-testid="test-todo-tags"
            >
              <li class="todo__category">Teaching</li>
              <li class="todo__category">Practicals</li>
            </ul>
          </div>
        </section>
        <footer class="todo__footer">
          <p class="todo__datetime">
            <span class="todo__datetime-label">Due date</span>
            <time
              datetime="2026-04-12T20:00"
              class="todo__due-date"
              data-testid="test-todo-due-date"
              >May 15th, 2026</time
            >
          </p>
          <p class="todo__datetime">
            <span class="todo__datetime-label">Time remaining</span>
            <span class="todo__remainingTime" data-testid="test-todo-time-remaining"
              >10 days</span
            >
          </p>
        </footer>
      </article>
    </main>
  </body>
</html>
